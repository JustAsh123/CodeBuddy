<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodeBuddy</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <section class="card header">
        <p class="eyebrow">Guided Mentor</p>
        <h1 class="title">CodeBuddy &#129504;</h1>
        <p id="pageInfo" class="subtitle">Open a LeetCode problem</p>
      </section>

      <section class="card">
        <h2 class="section-title">Action</h2>
        <label for="userApproach" class="field-label">Your Approach</label>
        <textarea
          id="userApproach"
          class="text-input"
          rows="4"
          placeholder="Describe your approach..."
        ></textarea>
        <p id="coachNote" class="callout hidden"></p>
        <div class="action-group">
          <button id="getHintBtn" class="button">Get Hint</button>
          <button id="regenerateBtn" class="button secondary hidden">Regenerate Hint</button>
        </div>
        <p id="status" class="status"></p>
      </section>

      <section class="card">
        <h2 class="section-title">Analysis</h2>
        <div class="content-block">
          <p id="analysis" class="content-text"></p>
        </div>
      </section>

      <section class="card">
        <h2 class="section-title">Mistake</h2>
        <div class="content-block">
          <p id="mistake" class="content-text"></p>
        </div>
      </section>

      <section class="card">
        <div class="section-header">
          <h2 class="section-title">Hints</h2>
          <p id="hintUsage" class="meta-text">Hints used: 0/3</p>
        </div>

        <button id="showHint1" class="button secondary hidden">Show Hint 1</button>
        <div id="hint1Box" class="hint hidden">
          <h3 class="hint-title">Hint 1</h3>
          <p id="hint1" class="content-text"></p>
        </div>

        <button id="showHint2" class="button secondary hidden">Show Hint 2</button>
        <div id="hint2Box" class="hint hidden">
          <h3 class="hint-title">Hint 2</h3>
          <p id="hint2" class="content-text"></p>
        </div>

        <button id="showHint3" class="button secondary hidden">Show Hint 3</button>
        <div id="hint3Box" class="hint hidden">
          <h3 class="hint-title">Hint 3</h3>
          <p id="hint3" class="content-text"></p>
        </div>
      </section>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
